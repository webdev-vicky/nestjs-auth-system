name: Deploy

on:
  push:
    branches: [main]

# Cancel any in-progress deploy for the same branch
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/nestjs-auth-api

jobs:
  # ─── Job 1: Build & push Docker image ───────────────────────────────────────
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    # Only deploy after CI passes
    needs: []
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Generates tags: sha-<short-sha>, latest, and semver if a tag was pushed
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}

      - name: Build and push production image
        uses: docker/build-push-action@v5
        with:
          context: .
          dockerfile: Dockerfile
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Job 2: Deploy to Kubernetes ─────────────────────────────────────────────
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: [build-and-push]
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      # Writes the base64-encoded kubeconfig from secrets to ~/.kube/config
      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      # Patch the image tag in the deployment manifests to the newly built SHA tag
      - name: Update image tag in manifests
        run: |
          IMAGE_TAG="${{ env.IMAGE_NAME }}:sha-${{ github.sha }}"
          sed -i "s|image: nestjs-auth-api:latest|image: ${IMAGE_TAG}|g" nestjs-auth-api.yaml
          sed -i "s|image: nestjs-auth-api:latest|image: ${IMAGE_TAG}|g" nestjs-api-m02-deployment.yaml

      - name: Apply Secrets & ConfigMap
        run: kubectl apply -f nestjs-auth-secrets.yaml

      - name: Apply MySQL
        run: kubectl apply -f nestjs-auth-mysql.yaml

      - name: Apply Redis
        run: kubectl apply -f nestjs-auth-redis.yaml

      - name: Apply MetalLB config
        run: kubectl apply -f metallb-config.yaml

      - name: Apply API Deployment & NodePort Service
        run: kubectl apply -f nestjs-auth-api.yaml

      - name: Apply LoadBalancer Service
        run: kubectl apply -f nestjs-api-loadbalancer.yaml

      - name: Apply HPA
        run: kubectl apply -f nestjs-api-hpa.yaml

      - name: Apply m02-node Deployment
        run: kubectl apply -f nestjs-api-m02-deployment.yaml

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/nestjs-api-deployment --timeout=120s
          kubectl rollout status deployment/nestjs-api-m02-deployment --timeout=120s

      - name: Verify pods are running
        run: kubectl get pods -o wide
